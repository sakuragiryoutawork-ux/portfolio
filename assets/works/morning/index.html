<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- リセット -->
    <link rel="stylesheet" href="css/destyle.css">
    <!-- カーソル -->
    <link rel="stylesheet" href="css/cursor.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <img alt="" class="cursor-img none">
    <div class="cursor-btn">
        <button class="on">ON</button>
        <button class="off">OFF</button>
    </div>
    <main>
        <div class="inare">
            <section>
                <h2>実装内容</h2>
                <p>画像のON/OFF切り替え機能と、ランダムで画像および追従速度が変化するインタラクションを実装しました。<br>
                画像がカーソルに対して遅れて追従するよう制御することで、より自然なアニメーション表現を実現しています。<br>
                さらに、状態に応じて不要な処理を停止する仕組みを取り入れ、動作の最適化も意識しました。</p>
            </section>
            <section>
                <h2>テーマを決めた背景</h2>
                <p>自分のポートフォリオにカーソルに合わせて何かがついてくるようなアニメーションを入れると面白いかなと思ったからです。</p>
            </section>
            <section class="technology">
                <h2>技術内容</h2>
                <ul>
                    <li>
                        <h3>＜JavaScript＞</h3>
                        <img src="img/js.png" alt="JavaScript">
                    </li>
                </ul>
            </section>
            <section>
                <h2>課題点</h2>
                <p>画像がそのままついてくるだけなので、何かアニメーションなどを付たいです。</p>
            </section>
        </div>
    </main>
    <script src="js/cursor.js"></script>
</body>

</html>
